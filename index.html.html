<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynatrace Account Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#0d0d1a;color:#f0f0ff;padding:20px;min-height:100vh}
.grad{background:linear-gradient(135deg,#2b4fcc,#6f2da8)}
.header{border-radius:10px;padding:16px 20px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header-left{display:flex;align-items:center;gap:14px}
.header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.sep{color:rgba(255,255,255,0.3);font-size:22px;font-weight:100}
#acctName{font-size:15px;font-weight:700;color:#fff;cursor:pointer;border-bottom:1px dashed rgba(255,255,255,0.4);background:none;border-top:none;border-left:none;border-right:none;outline:none;padding:2px 4px}
.btn{font-size:12px;padding:6px 14px;border-radius:4px;cursor:pointer;font-weight:400;border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.1);color:#fff}
.btn-primary{background:rgba(255,255,255,0.92);color:#1a1a35;font-weight:700;border:none}
.btn:hover{background:rgba(255,255,255,0.2)}
.btn-primary:hover{background:#fff}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.metric{background:#1a1a35;border-radius:8px;padding:14px 16px;border-top:2px solid #1a7aff}
.metric.warn{border-top-color:#ff3b3b}
.metric label{font-size:10px;color:#8888bb;text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:6px}
.metric .val{font-size:28px;font-weight:700;color:#fff;line-height:1;margin-bottom:3px}
.metric.warn .val{color:#ff3b3b}
.metric .sub{font-size:11px;color:#8888bb}
.now-bar{background:#1a1a35;border:1px solid #6f2da866;border-radius:8px;padding:10px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.now-pill{color:#fff;border-radius:4px;padding:3px 10px;font-size:11px;font-weight:800;letter-spacing:.05em;white-space:nowrap}
.tabs{display:flex;border-bottom:1px solid #2e2e55;margin-bottom:16px;overflow-x:auto}
.tab{background:none;border:none;border-bottom:2px solid transparent;padding:9px 18px;font-size:13px;font-weight:400;color:#8888bb;cursor:pointer;white-space:nowrap;margin-bottom:-1px}
.tab.active{color:#fff;font-weight:700;border-bottom-color:#00a8e0}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{font-size:10px;font-weight:700;color:#8888bb;padding:9px 12px;text-align:left;border-bottom:1px solid #3a3a66;background:#12122a;white-space:nowrap;letter-spacing:.07em;text-transform:uppercase}
td{font-size:12px;padding:10px 12px;border-bottom:1px solid #2e2e55;vertical-align:top;color:#f0f0ff}
tr:nth-child(even) td{background:#12122a}
tr:nth-child(odd) td{background:#1a1a35}
.badge{border-radius:4px;padding:2px 9px;font-size:11px;font-weight:700;white-space:nowrap;border:1px solid}
.add-btn{margin-top:14px;font-size:12px;padding:6px 16px;border-radius:4px;border:1px solid #3a3a66;color:#8888bb;background:transparent;cursor:pointer}
.add-btn:hover{background:#1a1a35}
input,select,textarea{font-size:12px;color:#f0f0ff;background:#0d0d1a;border:1px solid #3a3a66;border-radius:4px;padding:4px 8px;outline:none;font-family:Arial,sans-serif}
textarea{resize:vertical}
.edit-btn{background:none;border:none;cursor:pointer;color:#00a8e0;font-size:12px;padding:2px 4px;font-weight:700}
.del-btn{background:none;border:none;cursor:pointer;color:#44446a;font-size:12px;padding:2px 4px}
.journey-wrap{position:relative;padding-left:36px}
.journey-line{position:absolute;left:14px;top:4px;bottom:4px;width:2px;background:linear-gradient(135deg,#2b4fcc,#6f2da8)}
.j-item{position:relative;margin-bottom:14px}
.j-dot{position:absolute;left:-29px;top:6px;width:18px;height:18px;border-radius:50%;background:#0d0d1a;border:2px solid #44446a;display:flex;align-items:center;justify-content:center;z-index:1}
.j-card{border-radius:8px;padding:12px 16px;border:1px solid #2e2e55;background:#12122a}
.j-card.current{background:#1a1a35;border-color:#6f2da888}
.j-dates{display:flex;gap:20px;flex-wrap:wrap;align-items:flex-end;margin-bottom:4px}
.j-date-field label{font-size:10px;color:#8888bb;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:3px}
.j-date-field span{font-size:12px;color:#f0f0ff}
.footer{margin-top:20px;padding-top:12px;border-top:1px solid #2e2e55;display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px}
.footer span{font-size:11px;color:#44446a}
.toast{position:fixed;top:20px;right:20px;background:#00c853;color:#fff;padding:10px 20px;border-radius:6px;font-size:13px;font-weight:700;display:none;z-index:999}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="header grad" id="header">
  <div class="header-left">
    <img src="https://cdn.simpleicons.org/dynatrace/ffffff" alt="Dynatrace" style="height:28px" onerror="this.outerHTML='<span style=font-size:18px;font-weight:800;color:#fff;font-style:italic>dynatrace</span>'">
    <span class="sep">|</span>
    <input id="acctName" value="" placeholder="Click to add account name" oninput="updateTitle()" /> tracker
  </div>
  <div class="header-right">
    <span id="savedMsg" style="font-size:12px;color:#fff;font-weight:600;display:none">Saved</span>
    <button class="btn btn-primary" onclick="saveData()">Save</button>
    <button class="btn" onclick="exportExcel()">Export Excel</button>
    <button class="btn" onclick="exportSlides()">Download Slides</button>
    <button class="btn" onclick="toggleFullScreen()">Full Screen</button>
    <button class="btn" onclick="resetData()">Reset</button>
  </div>
</div>

<div class="metrics">
  <div class="metric" id="m0"><label>Open actions</label><div class="val" id="mv0">0</div><div class="sub" id="ms0"></div></div>
  <div class="metric warn" id="m1"><label>At risk / blocked</label><div class="val" id="mv1">0</div><div class="sub" id="ms1">items need attention</div></div>
  <div class="metric" id="m2"><label>Deliverables</label><div class="val" id="mv2">0</div><div class="sub" id="ms2"></div></div>
</div>

<div class="now-bar" id="nowBar" style="display:none">
  <span class="now-pill grad">NOW</span>
  <span id="nowText" style="font-size:13px;color:#8888bb"></span>
</div>

<div class="tabs" id="tabs"></div>
<div id="content"></div>

<div class="footer">
  <span>Dynatrace account tracker — click account name to rename for any customer</span>
  <span>2026 Dynatrace, LLC.</span>
</div>

<script>
const TABS = ["Journey","Action Items","Roadmap","Meetings","Deliverables","Ford Comms"];
let activeTab = 0;

let state = {
  acct: "",
  journey: [
    {id:1,phase:"Problem identified",planned:"Apr 2026",actual:"Apr 2026",delivery:"",status:"done",detail:"Ford flagged cost transparency as top priority. Unable to show cost breakdown by application team or business unit."},
    {id:2,phase:"Short-term solution built",planned:"May 1, 2026",actual:"May 13, 2026",delivery:"May 13, 2026",status:"done",detail:"Custom app built to approximate top billable metrics. Presented to Ford. Rejected as a permanent solution."},
    {id:3,phase:"Executive escalation",planned:"May 15, 2026",actual:"May 26, 2026",delivery:"",status:"done",detail:"Trevor Ealy joined as exec sponsor. Robin Pamayah assigned as lead."},
    {id:4,phase:"Working session",planned:"May 30, 2026",actual:"",delivery:"",status:"current",detail:"Align on current state, short-term options and long-term solution. Define mock data views and committed dates."},
    {id:5,phase:"Short-term delivery",planned:"Jun 15, 2026",actual:"",delivery:"",status:"upcoming",detail:"Deliver improved cost visibility using current product capabilities."},
    {id:6,phase:"Product dependencies",planned:"Jul 1, 2026",actual:"",delivery:"",status:"upcoming",detail:"GCP integration, Grail tag support, and inline lookup tables released."},
    {id:7,phase:"Long-term solution",planned:"Sep 1, 2026",actual:"",delivery:"",status:"upcoming",detail:"Full cost allocation solution delivered. Officially supported by Dynatrace."},
    {id:8,phase:"Renewal conversation",planned:"Nov 1, 2026",actual:"",delivery:"",status:"upcoming",detail:"Nate Wood uses consumption data to present repackage case to leadership."},
  ],
  actions: [
    {id:1,item:"Schedule working session with Steve Tack, Michael Winkler and account team",owner:"Robin Pamayah",dueDate:"2026-05-30",status:"In Progress",priority:"High",notes:"Trevor requested this week"},
    {id:2,item:"Send proposed meeting time to Trevor",owner:"Robin Pamayah",dueDate:"2026-05-28",status:"Not Started",priority:"High",notes:""},
    {id:3,item:"Prepare mock up of short-term data view",owner:"Mario Borja",dueDate:"2026-06-06",status:"In Progress",priority:"High",notes:"Custom app built, presented May 13"},
    {id:4,item:"Define long-term solution documentation",owner:"Edin Cristofi",dueDate:"2026-06-13",status:"Not Started",priority:"Medium",notes:""},
    {id:5,item:"Confirm dev preview drop from DT Product",owner:"Robin Pamayah",dueDate:"2026-05-30",status:"In Progress",priority:"High",notes:"Expected 1-2 weeks from May 8"},
  ],
  roadmap: [
    {id:1,item:"New GCP Integration (PRODUCT-14940)",dependency:"GCP Tag support",eta:"June Rally",status:"In Progress",notes:"Ford invited to limited private preview"},
    {id:2,item:"Grail Primary Tag (PRODUCT-15406)",dependency:"Central tag capability",eta:"June Rally",status:"Not Started",notes:"Required even with new GCP integration"},
    {id:3,item:"Grail Tag Support (PRODUCT-15071)",dependency:"Central tag capability",eta:"June Rally",status:"Not Started",notes:"Part of June rally"},
    {id:4,item:"Inline Lookup Table (PRODUCT-15622)",dependency:"GCP project ID mapping",eta:"July 2026",status:"Not Started",notes:"1MB object limit"},
    {id:5,item:"Grail Lookup Table (PRODUCT-12169)",dependency:"GCP project ID at scale",eta:"TBD",status:"Not Started",notes:"Unknown ETA. Would exceed inline lookup limit"},
  ],
  meetings: [
    {id:1,date:"2026-05-13",meeting:"Ford Short-Term Solution Presentation",outcome:"Custom app presented. Ford will not accept as permanent solution.",decisions:"Ford requires officially supported Dynatrace offering",followUp:"Robin Pamayah"},
    {id:2,date:"2026-04-29",meeting:"Ford April Governance Call",outcome:"Cost transparency top priority. Significant consumption run rate increase.",decisions:"Trevor Ealy to join as exec sponsor.",followUp:"Trevor Ealy"},
  ],
  delivs: [
    {id:1,deliverable:"Short-term cost allocation data view",description:"Mock up of current product capability output",committed:"TBD",status:"In Progress",acceptedByFord:"Pending",owner:"Mario Borja"},
    {id:2,deliverable:"Long-term solution design",description:"Full cost allocation solution with roadmap dependencies",committed:"Jun-Sep 2026",status:"Not Started",acceptedByFord:"Pending",owner:"Edin Cristofi"},
    {id:3,deliverable:"Dev preview integration",description:"GCP project tag metadata into platform",committed:"TBD",status:"In Progress",acceptedByFord:"Pending",owner:"DT Product"},
    {id:4,deliverable:"Renewal data package",description:"Consumption data to support Nate Wood renewal conversation",committed:"Before Dec 2026",status:"In Progress",acceptedByFord:"Pending",owner:"Robin Pamayah"},
  ],
  comms: [
    {id:1,date:"2026-05-13",by:"Robin Pamayah / Mario Borja",audience:"Ford stakeholders",summary:"Presented custom app as short-term solution.",response:"Will not accept as permanent. Wants officially supported offering.",next:"TBD - after working session"},
    {id:2,date:"2026-04-29",by:"Jason Trombley",audience:"Nate Wood, Parsh, Brum",summary:"Governance call. Cost transparency, tenant health, migration discussed.",response:"Nate Wood aligned on need to renegotiate ahead of Dec 2026.",next:"Next governance call"},
  ]
};

const STORAGE_KEY = "dt_tracker_main";

const STATUS_STYLE = {
  "Not Started": "background:#1a1a35;color:#8888bb;border-color:#2e2e55",
  "In Progress":  "background:#081a40;color:#1a7aff;border-color:#0f3a8a",
  "Completed":    "background:#0a2e14;color:#00c853;border-color:#0f5c28",
  "At Risk":      "background:#2a1400;color:#f0a030;border-color:#6b3300",
  "Blocked":      "background:#2e0808;color:#ff3b3b;border-color:#7a1010",
};
const PRIORITY_STYLE = {
  "High":   "background:#2e0808;color:#ff3b3b;border-color:#7a1010",
  "Medium": "background:#2a1400;color:#f0a030;border-color:#6b3300",
  "Low":    "background:#0a2e14;color:#00c853;border-color:#0f5c28",
};

function badge(label, styleMap) {
  const s = styleMap[label] || styleMap[Object.keys(styleMap)[0]];
  return '<span class="badge" style="'+s+'">'+label+'</span>';
}

function parseDateStr(s) {
  if (!s) return null;
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const p = s.trim().split(/[\s,]+/);
  const m = months.findIndex(x => p[0].startsWith(x));
  if (m >= 0) return new Date(parseInt(p[p.length-1]), m, parseInt(p[1])||1);
  const d = new Date(s); return isNaN(d) ? null : d;
}

function daysDiff(a,b) {
  const da=parseDateStr(a), db=parseDateStr(b);
  if (!da||!db) return null;
  return Math.round((db-da)/86400000);
}

function varianceHTML(planned, actual) {
  const d = daysDiff(planned, actual);
  if (d===null) return '<span style="color:#44446a">-</span>';
  if (d===0)  return '<span style="color:#00c853;font-weight:700">On time</span>';
  if (d>0)    return '<span style="color:#ff3b3b;font-weight:700">+'+d+'d late</span>';
  return '<span style="color:#00c853;font-weight:700">'+Math.abs(d)+'d early</span>';
}

function nextId(arr) { return Math.max(0,...arr.map(r=>r.id))+1; }

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.style.display = "block";
  setTimeout(() => t.style.display = "none", 2500);
}

function updateTitle() {
  state.acct = document.getElementById("acctName").value;
  document.title = (state.acct || "Account") + " Tracker | Dynatrace";
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  toast("Saved successfully");
  const m = document.getElementById("savedMsg");
  m.style.display = "inline"; setTimeout(() => m.style.display = "none", 2500);
}

function loadData() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return;
  try {
    const d = JSON.parse(raw);
    Object.assign(state, d);
    document.getElementById("acctName").value = state.acct || "";
    updateTitle();
  } catch(e) {}
}

function resetData() {
  if (!confirm("Reset all data to template defaults?")) return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

function toggleFullScreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}

function updateMetrics() {
  const open = state.actions.filter(a => a.status !== "Completed").length;
  const risk = state.actions.filter(a => a.status === "At Risk" || a.status === "Blocked").length;
  const done = state.delivs.filter(d => d.status === "Completed").length;
  const comp = state.actions.filter(a => a.status === "Completed").length;
  document.getElementById("mv0").textContent = open;
  document.getElementById("ms0").textContent = comp + " of " + state.actions.length + " completed";
  document.getElementById("mv1").textContent = risk;
  document.getElementById("m1").className = "metric" + (risk > 0 ? " warn" : "");
  document.getElementById("mv2").textContent = state.delivs.length;
  document.getElementById("ms2").textContent = done + " completed";
  const curr = state.journey.find(j => j.status === "current");
  const nb = document.getElementById("nowBar");
  if (curr) { nb.style.display = "flex"; document.getElementById("nowText").innerHTML = '<strong style="color:#f0f0ff">'+curr.phase+'</strong> - '+curr.detail; }
  else nb.style.display = "none";
}

function renderTabs() {
  document.getElementById("tabs").innerHTML = TABS.map((t,i) =>
    '<button class="tab'+(i===activeTab?" active":"")+'" onclick="switchTab('+i+')">'+t+'</button>'
  ).join("");
}

function switchTab(i) { activeTab = i; renderTabs(); renderContent(); }

function renderContent() {
  updateMetrics();
  const el = document.getElementById("content");
  if (activeTab === 0) el.innerHTML = renderJourney();
  else if (activeTab === 1) el.innerHTML = renderTable("actions", ["Action Item","Owner","Due Date","Status","Priority","Notes"], ["item","owner","dueDate","status","priority","notes"], ["30%","13%","10%","11%","10%","20%","6%"]);
  else if (activeTab === 2) el.innerHTML = renderTable("roadmap", ["Product Item","Dependency","ETA","Status","Notes"], ["item","dependency","eta","status","notes"], ["28%","20%","12%","12%","22%","6%"]);
  else if (activeTab === 3) el.innerHTML = renderTable("meetings", ["Date","Meeting","Outcome","Decisions","Follow-up"], ["date","meeting","outcome","decisions","followUp"], ["10%","20%","25%","25%","13%","7%"]);
  else if (activeTab === 4) el.innerHTML = renderTable("delivs", ["Deliverable","Description","Committed","Status","Ford Accepted","Owner"], ["deliverable","description","committed","status","acceptedByFord","owner"], ["19%","21%","11%","11%","13%","14%","11%"]);
  else if (activeTab === 5) el.innerHTML = renderTable("comms", ["Date","By","Audience","What We Told Ford","Ford Response","Next"], ["date","by","audience","summary","response","next"], ["9%","13%","12%","22%","22%","14%","8%"]);
}

function renderJourney() {
  const items = state.journey.map(s => {
    const isDone=s.status==="done", isCurr=s.status==="current";
    const dotColor = isDone?"#00c853":isCurr?"#1a7aff":"#44446a";
    const dotInner = isDone?'<span style="font-size:9px;color:#00c853;font-weight:900">&#10003;</span>':isCurr?'<span style="width:6px;height:6px;border-radius:50%;background:#1a7aff;display:block"></span>':"";
    return '<div class="j-item">'+
      '<div class="j-dot" style="border-color:'+dotColor+'">'+dotInner+'</div>'+
      '<div class="j-card'+(isCurr?" current":"")+'">'+
        '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;flex-wrap:wrap">'+
          '<div style="flex:1;min-width:200px">'+
            '<div style="font-size:14px;font-weight:700;color:#fff;margin-bottom:8px">'+s.phase+
              (isDone?'<span class="badge" style="background:#0a2e14;color:#00c853;border-color:#0f5c2833;margin-left:8px;font-size:10px">DONE</span>':"")+
              (isCurr?'<span class="badge" style="background:#081a40;color:#1a7aff;border-color:#0f3a8a33;margin-left:8px;font-size:10px">CURRENT</span>':"")+
            '</div>'+
            '<div class="j-dates">'+
              '<div class="j-date-field"><label>Planned</label><span>'+(s.planned||"-")+'</span></div>'+
              '<div class="j-date-field"><label>Actual</label><span>'+(s.actual||"-")+'</span></div>'+
              '<div class="j-date-field"><label>Delivery</label><span>'+(s.delivery||"-")+'</span></div>'+
              '<div class="j-date-field"><label>Variance</label>'+varianceHTML(s.planned,s.actual)+'</div>'+
            '</div>'+
            '<p style="font-size:12px;color:#8888bb;margin-top:6px;line-height:1.6">'+s.detail+'</p>'+
          '</div>'+
          '<div style="display:flex;gap:4px;flex-shrink:0">'+
            '<button class="edit-btn" onclick="editJourney('+s.id+')">edit</button>'+
            '<button class="del-btn" onclick="delJourney('+s.id+')">del</button>'+
          '</div>'+
        '</div>'+
      '</div>'+
    '</div>';
  }).join("");
  return '<div class="journey-wrap"><div class="journey-line"></div>'+items+
    '<button class="add-btn" onclick="addJourney()">+ Add milestone</button></div>';
}

function editJourney(id) {
  const s = state.journey.find(j=>j.id===id);
  if (!s) return;
  const ph = prompt("Phase name:", s.phase); if (ph===null) return;
  s.phase = ph;
  s.planned = prompt("Planned date:", s.planned)||s.planned;
  s.actual  = prompt("Actual date:", s.actual)||"";
  s.delivery= prompt("Delivery date:", s.delivery)||"";
  const opts = ["done","current","upcoming"];
  const st = prompt("Status (done/current/upcoming):", s.status);
  if (opts.includes(st)) s.status = st;
  s.detail = prompt("Detail:", s.detail)||s.detail;
  renderContent();
}

function delJourney(id) {
  if (!confirm("Delete this milestone?")) return;
  state.journey = state.journey.filter(j=>j.id!==id);
  renderContent();
}

function addJourney() {
  const id = nextId(state.journey);
  state.journey.push({id,phase:"New milestone",planned:"",actual:"",delivery:"",status:"upcoming",detail:"Add detail here"});
  renderContent();
  editJourney(id);
}

function renderTable(key, headers, fields, widths) {
  const STATUS_FIELDS = ["status","priority","acceptedByFord"];
  const rows = state[key].map((r,i) => {
    const tds = fields.map((f,fi) => {
      let val = r[f]||"";
      if (f==="status") val = badge(val, STATUS_STYLE);
      else if (f==="priority") val = badge(val, PRIORITY_STYLE);
      return '<td style="width:'+(widths[fi]||"auto")+'">'+val+'</td>';
    });
    return '<tr>'+tds.join("")+'<td style="width:'+(widths[fields.length]||"6%")+';white-space:nowrap">'+
      '<button class="edit-btn" onclick="editRow(\''+key+'\','+r.id+')">edit</button>'+
      '<button class="del-btn" onclick="delRow(\''+key+'\','+r.id+')">del</button>'+
      '</td></tr>';
  }).join("");
  const ths = headers.map((h,i)=>'<th style="width:'+(widths[i]||"auto")+'">'+h+'</th>').join("")+'<th></th>';
  const addLabel = {actions:"Add action item",roadmap:"Add dependency",meetings:"Add meeting",delivs:"Add deliverable",comms:"Add communication"}[key];
  return '<div style="overflow-x:auto"><table><thead><tr>'+ths+'</tr></thead><tbody>'+rows+'</tbody></table>'+
    '<button class="add-btn" onclick="addRow(\''+key+'\')">+ '+addLabel+'</button></div>';
}

const TEMPLATES = {
  actions:  {item:"New action item",owner:"",dueDate:"",status:"Not Started",priority:"Medium",notes:""},
  roadmap:  {item:"New dependency",dependency:"",eta:"",status:"Not Started",notes:""},
  meetings: {date:"",meeting:"New meeting",outcome:"",decisions:"",followUp:""},
  delivs:   {deliverable:"New deliverable",description:"",committed:"",status:"Not Started",acceptedByFord:"Pending",owner:""},
  comms:    {date:"",by:"",audience:"",summary:"",response:"",next:""},
};

const FIELD_LABELS = {
  item:"Item",owner:"Owner",dueDate:"Due Date",status:"Status",priority:"Priority",notes:"Notes",
  dependency:"Dependency",eta:"ETA",meeting:"Meeting",outcome:"Outcome",decisions:"Decisions",followUp:"Follow-up",
  deliverable:"Deliverable",description:"Description",committed:"Committed",acceptedByFord:"Ford Accepted",
  by:"Communicated By",audience:"Audience",summary:"What We Told Ford",response:"Ford Response",next:"Next Comm",
  date:"Date",
};

function editRow(key, id) {
  const r = state[key].find(x=>x.id===id);
  if (!r) return;
  const fields = Object.keys(TEMPLATES[key]);
  fields.forEach(f => {
    const val = prompt((FIELD_LABELS[f]||f)+":", r[f]||"");
    if (val !== null) r[f] = val;
  });
  renderContent();
}

function delRow(key, id) {
  if (!confirm("Delete this row?")) return;
  state[key] = state[key].filter(x=>x.id!==id);
  renderContent();
}

function addRow(key) {
  const id = nextId(state[key]);
  state[key].push({id,...TEMPLATES[key]});
  renderContent();
  editRow(key, id);
}

function exportExcel() {
  if (typeof XLSX === "undefined") { alert("Excel library not loaded. Please check your internet connection."); return; }
  const wb = XLSX.utils.book_new();
  const sheets = {
    "Action Items": {data:state.actions, fields:["item","owner","dueDate","status","priority","notes"]},
    "Roadmap":      {data:state.roadmap, fields:["item","dependency","eta","status","notes"]},
    "Meetings":     {data:state.meetings,fields:["date","meeting","outcome","decisions","followUp"]},
    "Deliverables": {data:state.delivs,  fields:["deliverable","description","committed","status","acceptedByFord","owner"]},
    "Ford Comms":   {data:state.comms,   fields:["date","by","audience","summary","response","next"]},
  };
  Object.entries(sheets).forEach(([name, {data, fields}]) => {
    const headers = fields.map(f => FIELD_LABELS[f]||f);
    const rows = data.map(r => fields.map(f => r[f]||""));
    const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
    ws["!cols"] = headers.map((_,i) => ({ wch: Math.min(45, Math.max(14, ...data.map(r => (fields[i]?r[fields[i]]:"").toString().length))) }));
    XLSX.utils.book_append_sheet(wb, ws, name);
  });
  XLSX.writeFile(wb, (state.acct||"Account")+"_Tracker.xlsx");
  toast("Excel downloaded");
}

function exportSlides() {
  const acct = state.acct || "Account";
  const C = {bg:"#0d0d1a",card:"#1a1a35",grad:"linear-gradient(135deg,#2b4fcc,#6f2da8)",cyan:"#00a8e0",green:"#00c853",red:"#ff3b3b",amber:"#f0a030",blue:"#1a7aff",text:"#f0f0ff",muted:"#8888bb"};

  const sb = s => {
    if (!s) return "";
    const v=s.toLowerCase();
    if(v.includes("complet")||v==="done") return '<span style="background:#0a2e14;color:'+C.green+';border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700">'+s+'</span>';
    if(v.includes("progress")||v==="current") return '<span style="background:#081a40;color:'+C.blue+';border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700">'+s+'</span>';
    if(v.includes("risk")) return '<span style="background:#2a1400;color:'+C.amber+';border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700">'+s+'</span>';
    if(v.includes("block")) return '<span style="background:#2e0808;color:'+C.red+';border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700">'+s+'</span>';
    return '<span style="background:#1a1a35;color:'+C.muted+';border-radius:4px;padding:2px 8px;font-size:11px">'+s+'</span>';
  };

  const hdr = (title,sub) => '<div style="background:'+C.grad+';border-radius:8px;padding:18px 28px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between"><div><div style="font-size:11px;color:rgba(255,255,255,0.6);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px">'+(sub||"Account Tracker")+'</div><div style="font-size:22px;font-weight:800;color:#fff">'+title+'</div></div><div style="text-align:right"><div style="font-size:18px;font-weight:800;color:#fff;font-style:italic">dynatrace</div><div style="font-size:11px;color:rgba(255,255,255,0.5)">'+(acct?acct+" | ":"")+new Date().toLocaleDateString()+'</div></div></div>';

  const tbl = (hdrs,rows,ws) => {
    const ths=hdrs.map((h,i)=>'<th style="background:#12122a;color:'+C.cyan+';padding:8px 12px;text-align:left;font-size:10px;letter-spacing:.07em;text-transform:uppercase;border-bottom:1px solid #2e2e55;width:'+(ws?ws[i]:"auto")+'">'+h+'</th>').join("");
    const trs=rows.map((r,i)=>'<tr>'+r.map(c=>'<td style="padding:9px 12px;border-bottom:1px solid #2e2e55;color:'+C.text+';background:'+(i%2===0?C.card:C.bg)+';vertical-align:top;font-size:12px">'+(c||"-")+'</td>').join("")+'</tr>').join("");
    return '<table style="width:100%;border-collapse:collapse">'+ths+trs+'</table>';
  };

  const slides = [
    '<div class="slide"><div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;text-align:center"><div style="background:'+C.grad+';border-radius:12px;padding:50px 70px;margin-bottom:30px"><div style="font-size:36px;font-weight:800;color:#fff;font-style:italic;margin-bottom:8px">dynatrace</div><div style="font-size:28px;font-weight:700;color:#fff;margin-bottom:6px">'+(acct?acct+" Account Tracker":"Account Tracker")+'</div><div style="font-size:14px;color:rgba(255,255,255,0.6)">Cost Allocation Working Session</div></div><div style="font-size:13px;color:'+C.muted+'">Updated '+new Date().toLocaleDateString()+' | Confidential</div></div></div>',
    '<div class="slide">'+hdr("Journey","Project Timeline")+'<div style="position:relative;padding-left:32px"><div style="position:absolute;left:10px;top:0;bottom:0;width:2px;background:'+C.grad+'"></div>'+state.journey.map(s=>{const iD=s.status==="done",iC=s.status==="current",dC=iD?C.green:iC?C.blue:"#44446a";return'<div style="position:relative;margin-bottom:12px"><div style="position:absolute;left:-27px;top:4px;width:14px;height:14px;border-radius:50%;background:'+C.bg+';border:2px solid '+dC+';display:flex;align-items:center;justify-content:center">'+(iD?'<span style="font-size:8px;color:'+C.green+';font-weight:900">v</span>':iC?'<span style="width:5px;height:5px;border-radius:50%;background:'+C.blue+';display:block"></span>':"")+'</div><div style="background:'+(iC?"#12203a":C.card)+';border:1px solid '+(iC?C.blue+"66":"#2e2e55")+';border-radius:6px;padding:10px 14px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="font-size:13px;font-weight:700;color:#fff">'+s.phase+'</span>'+(iD?'<span style="font-size:10px;color:'+C.green+';background:#0a2e14;border-radius:3px;padding:1px 6px;font-weight:700">DONE</span>':iC?'<span style="font-size:10px;color:'+C.blue+';background:#081a40;border-radius:3px;padding:1px 6px;font-weight:700">CURRENT</span>':"")+'</div><div style="display:flex;gap:20px;font-size:11px;color:'+C.muted+';margin-bottom:4px"><span>Planned: <strong style="color:'+C.text+'">'+(s.planned||"-")+'</strong></span><span>Actual: <strong style="color:'+C.text+'">'+(s.actual||"-")+'</strong></span><span>Delivery: <strong style="color:'+C.text+'">'+(s.delivery||"-")+'</strong></span></div><div style="font-size:11px;color:'+C.muted+'">'+s.detail+'</div></div></div>';}).join("")+'</div></div>',
    '<div class="slide">'+hdr("Action Items","Open Actions")+tbl(["Action Item","Owner","Due Date","Status","Priority"],state.actions.map(a=>[a.item,a.owner,a.dueDate,sb(a.status),sb(a.priority)]),["35%","15%","12%","14%","12%"])+'</div>',
    '<div class="slide">'+hdr("Roadmap","Product Roadmap")+tbl(["Product Item","Dependency","ETA","Status"],state.roadmap.map(r=>[r.item,r.dependency,r.eta,sb(r.status)]),["35%","25%","15%","15%"])+'</div>',
    '<div class="slide">'+hdr("Meetings","Meeting Log")+tbl(["Date","Meeting","Outcome","Decision","Follow-up"],state.meetings.map(m=>[m.date,m.meeting,m.outcome,m.decisions,m.followUp]),["10%","18%","25%","25%","12%"])+'</div>',
    '<div class="slide">'+hdr("Deliverables","Committed Deliverables")+tbl(["Deliverable","Description","Committed","Status","Ford Accepted","Owner"],state.delivs.map(d=>[d.deliverable,d.description,d.committed,sb(d.status),d.acceptedByFord,d.owner]),["20%","20%","12%","12%","12%","12%"])+'</div>',
    '<div class="slide">'+hdr("Ford Communications","Comms Log")+tbl(["Date","By","Audience","What We Told Ford","Ford Response","Next"],state.comms.map(c=>[c.date,c.by,c.audience,c.summary,c.response,c.next]),["9%","13%","12%","22%","22%","12%"])+'</div>',
  ];

  const html='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>'+acct+' Slides</title><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#000;font-family:Arial,sans-serif;color:#f0f0ff}.slide{display:none;background:#0d0d1a;min-height:100vh;padding:40px 50px}.slide.active{display:block}.nav{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:99;align-items:center}.nav button{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.25);color:#fff;padding:8px 20px;border-radius:5px;cursor:pointer;font-size:13px;font-weight:700}.ctr{color:#8888bb;font-size:12px;min-width:60px;text-align:center}</style></head><body>'+slides.join("\n")+'<div class="nav"><button onclick="go(-1)">Prev</button><span class="ctr" id="c"></span><button onclick="go(1)">Next</button></div><script>var i=0;var s=document.querySelectorAll(".slide");function show(n){s.forEach(function(x,j){x.classList.toggle("active",j===n)});document.getElementById("c").textContent=(n+1)+" / "+s.length;}function go(d){i=Math.max(0,Math.min(s.length-1,i+d));show(i);}document.addEventListener("keydown",function(e){if(e.key==="ArrowRight"||e.key==="ArrowDown")go(1);if(e.key==="ArrowLeft"||e.key==="ArrowUp")go(-1);});show(0);<\/script></body></html>';

  const blob = new Blob([html],{type:"text/html"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = acct+"_Tracker_Slides.html";
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  toast("Slides downloaded");
}

loadData();
renderTabs();
renderContent();
</script>
</body>
</html>
